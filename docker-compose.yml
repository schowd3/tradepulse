services:
  api:
    build: .
    container_name: tradepulse-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tradepulse_user:tradepulse_pass@postgres:5432/tradepulse_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: tradepulse-postgres
    environment:
      POSTGRES_USER: tradepulse_user
      POSTGRES_PASSWORD: tradepulse_pass
      POSTGRES_DB: tradepulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepulse_user -d tradepulse_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: